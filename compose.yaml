
###> doctrine/doctrine-bundle ###
services:
  php:
    build:
      context: .
    container_name: catalogue_php
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      - database

  web:
    image: nginx:alpine
    container_name: catalogue_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  database:
    image: mysql:8.0
    container_name: catalogue_mysql
    environment:
      MYSQL_DATABASE: democatalogue
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: symfony
      MYSQL_PASSWORD: symfony
    ports:
      - "3307:3306"
    volumes:
      - database_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  database_data: